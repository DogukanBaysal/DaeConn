services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ips
      POSTGRES_USER: ipsuser
      POSTGRES_PASSWORD: ipspass
    # ports:
    #   - "5432:5432"      # change to 5433:5432 in the *other* project if both run together
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipsuser -d ips"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ipsuser:ipspass@db:5432/ips
      APP_DATA_DIR: /app
    command: ["python", "main.py"]
    volumes:
      - type: bind
        source: ./targets
        target: /app/targets
      - type: bind
        source: ./state
        target: /app/state
      - type: bind
        source: ./exports
        target: /app/exports

name: scanner_b