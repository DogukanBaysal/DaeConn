services:
  db:
    image: postgres:16
    command: ["postgres", "-c", "max_connections=2000"]
    environment:
      POSTGRES_DB: ips
      POSTGRES_USER: ipsuser
      POSTGRES_PASSWORD: ipspass
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipsuser -d ips"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ipsuser:ipspass@db:5432/ips
      APP_DATA_DIR: /app
    command: ["python", "main.py"]
    volumes:
      - type: bind
        source: ./targets
        target: /app/targets
      - type: bind
        source: ./state
        target: /app/state
      - type: bind
        source: ./exports
        target: /app/exports

  grafana:
    image: grafana/grafana:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Europe/Zurich
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  grafana_data:

name: connector_bitcoin